<div class="card notes-card d-flex flex-column shadow-sm">
    <div class="card-header bg-white border-bottom-0 d-flex justify-content-between align-items-center pt-3 px-3 pb-0">
        <h6 class="mb-0 fw-bold" style="color: #0b2046;">My Notes</h6>
        <button id="addNoteBtn" class="btn btn-sm text-white" style="background-color: #213a70; border-radius: 20px px-3;">+ Add Note</button>
    </div>
    <div class="card-body notes-body d-flex flex-column" id="notesContainer">
        
        <div id="emptyNotesState" class="empty-state text-center text-muted m-auto py-4">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2" style="opacity: 0.2;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <p class="small text-uppercase fw-semibold" style="opacity: 0.4;">No notes yet</p>
        </div>

        <div id="noteForm" class="note-form mb-3" style="display: none;">
            <input type="text" id="noteTitle" class="form-control form-control-sm mb-2" placeholder="Title">
            <textarea id="noteContent" class="form-control form-control-sm mb-2" rows="3" placeholder="Take a note..."></textarea>
            <div class="d-flex justify-content-end gap-2">
                <button id="cancelNoteBtn" class="btn btn-sm btn-light border">Cancel</button>
                <button id="saveNoteBtn" class="btn btn-sm text-white" style="background-color: #213a70;">Save</button>
            </div>
        </div>

        <div id="savedNotesList" class="saved-notes d-flex flex-column gap-2">
            </div>
    </div>
</div>
