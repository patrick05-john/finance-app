{% extends "base.html" %}
{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h3>Create Savings Goal</h3>

    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
            {{ form.goal_name.label }}
            {{ form.goal_name(class="form-control") }}
        </div>

        <div class="mb-3">
            {{ form.target_amount.label }}
            {{ form.target_amount(class="form-control") }}
        </div>

        <button class="btn btn-primary w-100">Create Goal</button>
    </form>
</div>
{% endblock %}
