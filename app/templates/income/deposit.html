{% extends "base.html" %}
{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h3>Deposit to {{ goal.goal_name }}</h3>

    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
            {{ form.deposit_amount.label }}
            {{ form.deposit_amount(class="form-control") }}
        </div>

        <button class="btn btn-primary w-100">Deposit</button>
    </form>
</div>
{% endblock %}
