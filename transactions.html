<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinanceTracker</title>
    <style>
        :root {
            --primary-blue: #1e3a8a; /* Changed from green to match the aesthetic */
            --primary-blue-hover: #1e40af;
            --dark-bg: #111827;
            --light-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        /* Updated Button Style */
        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-blue-hover);
        }

        /* Modal Background */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Modal Content */
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .nested-box {
            border: 1px solid var(--primary-blue);
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            background-color: #eff6ff;
        }

        .nested-box label {
            color: var(--primary-blue);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .btn-save {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div>
            <h1 style="margin: 0;">Transactions</h1>
            <p style="margin: 0; color: var(--text-muted);">Unified financial tracking.</p>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-primary" onclick="document.getElementById('transactionModal').style.display='flex'">+ Add Transaction</button>
            <button class="btn btn-primary">Add Plan</button>
        </div>
    </div>

    <div id="transactionModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Record a Transaction</h3>
                <button class="close-btn" onclick="document.getElementById('transactionModal').style.display='none'">&times;</button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <select class="form-control">
                        <option>Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (?)</label>
                    <input type="text" class="form-control" value="0.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select class="form-control">
                        <option>Foods</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" class="form-control" value="2026-02-27">
                </div>
            </div>

            <div class="form-group">
                <label>Funding Source</label>
                <select class="form-control" id="fundingSource">
                    <option>Active Budget Allocation</option>
                </select>
            </div>

            <div class="form-group nested-box" id="specificBudgetBox">
                <label>Select Specific Budget</label>
                <select class="form-control" style="margin-top: 8px;">
                    <option>-- Choose an Active Budget --</option>
                    <option selected>Weekly Allowance (Balance: ?850.00)</option>
                    <option>Transportation (Balance: ?150.00)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea class="form-control" rows="2" placeholder="Brief note..."></textarea>
            </div>

            <button class="btn btn-primary btn-save">Save Transaction</button>
        </div>
    </div>

</body>
</html>
